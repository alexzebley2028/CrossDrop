name: crossdrop
description: "Android Nearby Share implementation for Flutter"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  bonsoir: ^6.1.0
  cryptography: ^2.9.0
  device_info_plus: ^13.1.0
  file_selector: ^1.1.0
  fixnum: ^1.1.1
  flutter:
    sdk: flutter
  flutter_local_notifications: ^21.0.0
  mime: ^2.0.0
  path: ^1.9.1
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  pointycastle: ^4.0.0
  protobuf: ^6.0.0
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5
  system_tray: ^2.0.3
  url_launcher: ^6.3.2
  uuid: ^4.5.3
  window_manager: ^0.5.1

dependency_overrides:
  uuid: ^4.5.3

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/sf_symbols/
    - assets/icons/

flutter_launcher_icons:
  android: false
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icons/app_icon.png"
  web:
    generate: false
  windows:
    generate: true
    icon_size: 128 # min:48, max:256, default: 48
    image_path: "assets/icons/app_icon.png"
  macos:
    generate: true
    image_path: "assets/icons/app_icon.png"
